<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="VB Strength">
<title>VB Strength Program</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #ffffff; --bg2: #f5f5f5; --bg3: #eeeeee;
  --text: #111111; --text2: #666666; --text3: #999999;
  --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.2);
  --blue-bg: #E6F1FB; --blue: #185FA5;
  --green-bg: #EAF3DE; --green: #3B6D11;
  --amber-bg: #FAEEDA; --amber: #854F0B;
  --red-bg: #FCEBEB; --red: #A32D2D;
  --purple-bg: #EEEDFE; --purple: #3C3489;
  --radius: 12px; --radius-sm: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a1a; --bg2: #242424; --bg3: #2e2e2e;
    --text: #f0f0f0; --text2: #aaaaaa; --text3: #777777;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
    --blue-bg: #0d2e4a; --blue: #6db3f2;
    --green-bg: #1a2e10; --green: #7ec850;
    --amber-bg: #2e1f00; --amber: #f0a830;
    --red-bg: #2e0d0d; --red: #f07070;
    --purple-bg: #1a1540; --purple: #a89cf7;
  }
}

body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
.app { max-width: 430px; margin: 0 auto; background: var(--bg3); min-height: 100vh; padding-bottom: 80px; }

/* ── Header ── */
.main-header { background: var(--bg); border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 20; }
.header-top { padding: env(safe-area-inset-top, 44px) 20px 0; }
.week-strip { display: flex; overflow-x: auto; scrollbar-width: none; padding: 0 4px; }
.week-strip::-webkit-scrollbar { display: none; }
.week-pill { flex-shrink: 0; padding: 10px 10px; font-size: 11px; font-weight: 700; color: var(--text2); border-bottom: 2px solid transparent; cursor: pointer; background: none; border-left: none; border-right: none; border-top: none; white-space: nowrap; display: flex; flex-direction: column; align-items: center; gap: 2px; letter-spacing: 0.02em; }
.week-pill.active { color: var(--text); border-bottom: 2px solid var(--text); }
.wdot { width: 5px; height: 5px; border-radius: 50%; background: var(--border2); margin-top: 1px; transition: background 0.2s; }
.week-pill.done .wdot { background: var(--green); }
.week-pill.current .wdot { background: var(--blue); }
.week-pill.active .wdot { opacity: 0; }
.week-info { padding: 8px 16px 10px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.week-title { font-size: 17px; font-weight: 700; color: var(--text); }
.week-meta { font-size: 11px; color: var(--text2); flex: 1; }
.done-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; background: var(--green-bg); color: var(--green); letter-spacing: 0.04em; text-transform: uppercase; }

/* Progress bar */
.progress-bar-wrap { padding: 0 16px 10px; }
.progress-bar-track { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.4s ease; width: 0%; }
.progress-label { font-size: 10px; color: var(--text3); margin-top: 4px; font-weight: 500; }

/* Day strip */
.day-strip { display: flex; overflow-x: auto; scrollbar-width: none; padding: 0 8px; border-top: 0.5px solid var(--border); }
.day-strip::-webkit-scrollbar { display: none; }
.day-pill { flex-shrink: 0; padding: 9px 12px; font-size: 12px; font-weight: 600; color: var(--text2); border-bottom: 2px solid transparent; cursor: pointer; background: none; border-left: none; border-right: none; border-top: none; white-space: nowrap; display: flex; flex-direction: column; align-items: center; gap: 2px; }
.day-pill.active { color: var(--text); border-bottom: 2px solid var(--text); }
.ddot { width: 5px; height: 5px; border-radius: 50%; background: var(--border2); }
.lift-day .ddot { background: var(--blue); }
.vb-day .ddot { background: var(--green); }
.pump-day .ddot { background: var(--amber); }
.day-pill.active .ddot { opacity: 0; }
.today-pill { position: relative; }
.today-dot { position: absolute; top: 6px; right: 6px; width: 4px; height: 4px; border-radius: 50%; background: var(--blue); }

/* ── Rest Timer ── */
.timer-overlay { display: none; position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); width: calc(100% - 32px); max-width: 398px; background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 14px 16px; z-index: 50; box-shadow: 0 4px 24px rgba(0,0,0,0.12); }
.timer-overlay.visible { display: flex; align-items: center; gap: 12px; }
.timer-ring { width: 48px; height: 48px; flex-shrink: 0; }
.timer-ring svg { transform: rotate(-90deg); }
.timer-ring circle { fill: none; stroke-width: 3; }
.timer-ring .track { stroke: var(--bg3); }
.timer-ring .fill { stroke: var(--blue); stroke-dasharray: 132; stroke-dashoffset: 132; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
.timer-info { flex: 1; }
.timer-countdown { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1; }
.timer-label { font-size: 11px; color: var(--text2); margin-top: 2px; }
.timer-skip { font-size: 12px; font-weight: 600; color: var(--blue); cursor: pointer; background: none; border: none; padding: 4px 0; }

/* ── Sections ── */
.section { margin: 12px 16px 0; background: var(--bg); border-radius: var(--radius); border: 0.5px solid var(--border); overflow: hidden; }
.section-header { padding: 9px 14px; border-bottom: 0.5px solid var(--border); font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text2); }

/* Lift rows */
.lift-row { padding: 11px 14px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 8px; }
.lift-row:last-child { border-bottom: none; }
.lift-label { font-size: 13px; color: var(--text); font-weight: 500; flex: 1; min-width: 0; }
.lift-sub { font-size: 11px; color: var(--text2); font-weight: 400; margin-top: 1px; }
.lift-target { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; }
.badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 700; white-space: nowrap; }
.badge-wu { background: var(--bg3); color: var(--text2); }
.badge-work { background: var(--blue-bg); color: var(--blue); }
.badge-attempt { background: var(--purple-bg); color: var(--purple); }

/* ── Acc rows ── */
.acc-row { border-bottom: 0.5px solid var(--border); transition: background 0.15s; }
.acc-row:last-child { border-bottom: none; }
.acc-row.active-row { background: var(--blue-bg); }
.acc-header { padding: 10px 14px 0; display: flex; align-items: center; gap: 0; cursor: pointer; }
.acc-header-left { flex: 1; }
.acc-top { display: flex; align-items: baseline; gap: 6px; margin-bottom: 2px; flex-wrap: wrap; }
.acc-name { font-size: 13px; font-weight: 700; color: var(--text); }
.acc-meta { font-size: 11px; color: var(--text2); }
.acc-rec { font-size: 11px; color: var(--blue); font-weight: 600; }
.acc-chevron { font-size: 12px; color: var(--text3); padding: 0 4px; transition: transform 0.2s; flex-shrink: 0; }
.acc-chevron.open { transform: rotate(180deg); }
.acc-cue { font-size: 11px; color: var(--text2); line-height: 1.45; padding: 4px 14px 8px; display: none; }
.acc-cue.visible { display: block; }
.acc-body { padding: 6px 14px 10px; }
.set-inputs { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
.set-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.set-lbl { font-size: 10px; color: var(--text3); font-weight: 500; }
.set-input-row { display: flex; align-items: center; gap: 4px; }
.set-input { width: 58px; height: 40px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg2); font-size: 15px; font-weight: 700; text-align: center; color: var(--text); font-family: inherit; transition: border-color 0.15s, background 0.15s; }
.set-input:focus { outline: none; border-color: var(--blue); background: var(--bg); }
.set-input.done { border-color: var(--green); background: var(--green-bg); color: var(--green); }
.set-check { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--border2); background: var(--bg2); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
.set-check.checked { background: var(--green); border-color: var(--green); }
.set-check::after { content: ''; width: 8px; height: 5px; border-left: 2px solid var(--bg); border-bottom: 2px solid var(--bg); transform: rotate(-45deg) translateY(-1px); display: none; }
.set-check.checked::after { display: block; }
.autofill-btn { font-size: 10px; color: var(--blue); font-weight: 600; background: none; border: none; cursor: pointer; padding: 4px 0; margin-left: 4px; white-space: nowrap; }

/* Callouts */
.callout { margin: 12px 16px 0; padding: 10px 14px; border-radius: var(--radius); font-size: 12px; line-height: 1.55; font-weight: 500; }
.c-blue { background: var(--blue-bg); color: var(--blue); }
.c-green { background: var(--green-bg); color: var(--green); }
.c-amber { background: var(--amber-bg); color: var(--amber); }
.c-gray { background: var(--bg2); color: var(--text2); }
.c-success { background: var(--green-bg); color: var(--green); }
.c-error { background: var(--red-bg); color: var(--red); }
.c-purple { background: var(--purple-bg); color: var(--purple); }

/* Checklist */
.mob-row { padding: 10px 14px; border-bottom: 0.5px solid var(--border); display: flex; align-items: flex-start; gap: 10px; }
.mob-row:last-child { border-bottom: none; }
.mob-check { width: 22px; height: 22px; border-radius: 5px; border: 1.5px solid var(--border2); background: var(--bg2); flex-shrink: 0; margin-top: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.mob-check.checked { background: var(--text); border-color: var(--text); }
.mob-check.checked::after { content: ''; width: 9px; height: 5px; border-left: 2px solid var(--bg); border-bottom: 2px solid var(--bg); transform: rotate(-45deg) translateY(-1px); display: block; }
.mob-info { flex: 1; }
.mob-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.mob-detail { font-size: 11px; color: var(--text2); line-height: 1.4; }
.mob-vol { font-size: 11px; color: var(--blue); font-weight: 600; margin-top: 2px; }

/* Tags */
.day-tag { display: inline-block; font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; margin-bottom: 8px; letter-spacing: 0.04em; text-transform: uppercase; }
.tag-lift { background: var(--blue-bg); color: var(--blue); }
.tag-vb { background: var(--green-bg); color: var(--green); }
.tag-pump { background: var(--amber-bg); color: var(--amber); }
.tag-rest { background: var(--bg2); color: var(--text2); }
.tag-test { background: var(--purple-bg); color: var(--purple); }

/* Buttons */
.save-btn { display: block; width: calc(100% - 32px); margin: 12px 16px 0; padding: 15px; background: var(--text); color: var(--bg); border: none; border-radius: var(--radius); font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; transition: opacity 0.15s; }
.save-btn:disabled { opacity: 0.4; }
.save-btn:active { opacity: 0.75; }

/* Locked banner */
.locked-banner { margin: 12px 16px 0; padding: 12px 14px; background: var(--green-bg); border-radius: var(--radius); }
.locked-banner span { font-size: 13px; font-weight: 600; color: var(--green); }

/* Bottom nav */
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--bg); border-top: 0.5px solid var(--border); display: flex; padding: 10px 0 env(safe-area-inset-bottom, 16px); z-index: 30; }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; cursor: pointer; padding: 4px 0; }
.nav-icon { width: 22px; height: 22px; border-radius: 5px; background: var(--border); transition: background 0.15s; }
.nav-icon.on { background: var(--text); }
.nav-lbl { font-size: 10px; color: var(--text2); font-weight: 500; }
.nav-lbl.on { color: var(--text); font-weight: 700; }

/* History / Maxes */
.hist-row { padding: 12px 14px; border-bottom: 0.5px solid var(--border); }
.hist-row:last-child { border-bottom: none; }
.hist-date { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
.hist-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.hist-detail { font-size: 11px; color: var(--text2); }
.max-row { padding: 12px 14px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; }
.max-row:last-child { border-bottom: none; }
.max-lbl { font-size: 14px; font-weight: 500; color: var(--text); flex: 1; }
.max-input { width: 90px; height: 40px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg2); font-size: 14px; font-weight: 600; text-align: center; color: var(--text); font-family: inherit; }
.max-input:focus { outline: none; border-color: var(--blue); }

/* Rest / misc */
.rest-hero { margin: 20px 16px 0; padding: 28px 20px; background: var(--bg); border-radius: var(--radius); border: 0.5px solid var(--border); text-align: center; }
.rest-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
.rest-body { font-size: 13px; color: var(--text2); line-height: 1.65; }
.screen { display: none; }
.screen.active { display: block; }
.day-screen { display: none; }
.day-screen.active { display: block; }
.spacer { height: 16px; }
.screen-title { padding: 18px 16px 4px; font-size: 20px; font-weight: 700; color: var(--text); }
.empty-state { padding: 48px 20px; text-align: center; color: var(--text2); font-size: 13px; line-height: 1.65; }
</style>
</head>
<body>
<div class="app">

<!-- MAIN HEADER -->
<div class="main-header" id="mainHeader">
  <div class="header-top">
    <div class="week-strip" id="weekStrip"></div>
    <div class="week-info" id="weekInfo"></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">0 of 0 sets completed</div>
    </div>
  </div>
  <div class="day-strip" id="dayStrip"></div>
</div>

<!-- REST TIMER -->
<div class="timer-overlay" id="timerOverlay">
  <div class="timer-ring">
    <svg width="48" height="48" viewBox="0 0 48 48">
      <circle class="track" cx="24" cy="24" r="21"/>
      <circle class="fill" id="timerArc" cx="24" cy="24" r="21"/>
    </svg>
  </div>
  <div class="timer-info">
    <div class="timer-countdown" id="timerCountdown">3:00</div>
    <div class="timer-label" id="timerLabel">Rest — next set when ready</div>
  </div>
  <button class="timer-skip" onclick="stopTimer()">Skip</button>
</div>

<!-- PROGRAM SCREEN -->
<div class="screen active" id="screen-program">
  <div id="programContent"></div>
</div>

<!-- HISTORY SCREEN -->
<div class="screen" id="screen-history">
  <div class="screen-title">Session history</div>
  <div id="history-content" style="margin-top:8px"><div class="empty-state">Loading...</div></div>
</div>

<!-- MAXES SCREEN -->
<div class="screen" id="screen-maxes">
  <div class="screen-title">Training maxes</div>
  <div class="section" style="margin-top:12px">
    <div class="section-header">Current TMs &middot; update after PRs</div>
    <div class="max-row"><div class="max-lbl">Back Squat</div><input class="max-input" id="tm-squat" type="text" value="230 lbs"></div>
    <div class="max-row"><div class="max-lbl">Incline Bench</div><input class="max-input" id="tm-bench" type="text" value="185 lbs"></div>
    <div class="max-row"><div class="max-lbl">Hex Bar Deadlift</div><input class="max-input" id="tm-dl" type="text" value="315 lbs"></div>
    <div class="max-row"><div class="max-lbl">OHP (Strict)</div><input class="max-input" id="tm-ohp" type="text" value="115 lbs"></div>
  </div>
  <div id="maxes-status"></div>
  <button class="save-btn" onclick="saveMaxes()">Save maxes to sheet</button>
  <div class="callout c-gray" style="margin-top:12px">When you finish Week 8, share your Google Sheet with me and I'll generate your next program from your logged data.</div>
  <div class="spacer"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn" onclick="showScreen('program')"><div class="nav-icon on" id="ni-program"></div><span class="nav-lbl on" id="nl-program">Program</span></button>
  <button class="nav-btn" onclick="showScreen('history')"><div class="nav-icon" id="ni-history"></div><span class="nav-lbl" id="nl-history">History</span></button>
  <button class="nav-btn" onclick="showScreen('maxes')"><div class="nav-icon" id="ni-maxes"></div><span class="nav-lbl" id="nl-maxes">Maxes</span></button>
</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzLuijUOxwOOV2NESQGajLZQwe4ZTf1d7xjdW5xXdBp6Oh7BFQ70pknZsLgaCGOEB47/exec';
const CURRENT_WEEK = 3;
const DAY_NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const TM = { squat:230, bench:185, dl:315, ohp:115 };

function r5(n) { return Math.round(n/5)*5; }

// ── Today detection ──
function getTodayDayIdx() {
  const d = new Date().getDay(); // 0=Sun
  return [6,0,1,2,3,4,5][d]; // remap to Mon=0..Sun=6
}
function getTodayWeekIdx() {
  // Week 3 starts Apr 14, 2026
  const start = new Date('2026-04-14');
  const today = new Date();
  const diff = Math.floor((today - start) / (7 * 86400000));
  const weekIdx = Math.max(0, Math.min(7, CURRENT_WEEK - 1 + diff));
  return weekIdx;
}

// ── Timer ──
let timerInterval = null;
let timerTotal = 0;
let timerLeft = 0;
const circumference = 2 * Math.PI * 21;

function startTimer(seconds, label) {
  stopTimer();
  timerTotal = seconds;
  timerLeft = seconds;
  document.getElementById('timerLabel').textContent = label;
  const overlay = document.getElementById('timerOverlay');
  overlay.classList.add('visible');
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerLeft--;
    updateTimerDisplay();
    if (timerLeft <= 0) stopTimer();
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timerLeft / 60);
  const s = timerLeft % 60;
  document.getElementById('timerCountdown').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  const pct = timerLeft / timerTotal;
  const offset = circumference * (1 - pct);
  document.getElementById('timerArc').style.strokeDashoffset = offset;
  document.getElementById('timerArc').style.strokeDasharray = circumference;
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  document.getElementById('timerOverlay').classList.remove('visible');
}

// ── Progress tracking ──
function updateProgress() {
  const checks = document.querySelectorAll('.set-check');
  const done = document.querySelectorAll('.set-check.checked');
  const total = checks.length;
  const completed = done.length;
  const pct = total > 0 ? Math.round((completed / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${completed} of ${total} sets completed`;
}

// ── Set check handler ──
function handleSetCheck(checkEl, isWorkingSet) {
  checkEl.classList.toggle('checked');
  const inp = checkEl.closest('.set-input-row').querySelector('.set-input');
  if (checkEl.classList.contains('checked')) {
    inp.classList.add('done');
    const restTime = isWorkingSet ? 180 : 90;
    const label = isWorkingSet ? 'Rest — 3 min for primary lifts' : 'Rest — 90s for accessories';
    startTimer(restTime, label);
  } else {
    inp.classList.remove('done');
    stopTimer();
  }
  // Highlight active row
  document.querySelectorAll('.acc-row').forEach(r => r.classList.remove('active-row'));
  const row = checkEl.closest('.acc-row');
  if (row && !checkEl.classList.contains('checked')) row.classList.add('active-row');
  updateProgress();
}

// ── Autofill ──
function autofill(btn) {
  const body = btn.closest('.acc-body');
  const inputs = body.querySelectorAll('.set-input');
  if (inputs.length < 2) return;
  const firstVal = inputs[0].value;
  if (!firstVal) return;
  inputs.forEach((inp, i) => { if (i > 0 && !inp.classList.contains('done')) inp.value = firstVal; });
}

// ── Toggle cue ──
function toggleCue(header) {
  const row = header.closest('.acc-row');
  const cue = row.querySelector('.acc-cue');
  const chevron = row.querySelector('.acc-chevron');
  cue.classList.toggle('visible');
  chevron.classList.toggle('open');
}

// ── Data ──
const WEEKS = [
  { n:1, phase:'Accumulation',    dates:'Mar 30 – Apr 4',   intensity:'65–76%', volume:'4×8', rpe:'6–7', reps:8, pcts:[0.65,0.70,0.74,0.76], done:true },
  { n:2, phase:'Accumulation',    dates:'Apr 7 – Apr 11',   intensity:'68–78%', volume:'4×7', rpe:'7',   reps:7, pcts:[0.68,0.72,0.76,0.78], done:true },

function calcLoads(weekN) {
  const w = WEEKS[weekN - 1];
  const out = {};
  ['squat','bench','dl','ohp'].forEach(lift => {
    const tm = TM[lift];
    const wu1 = r5(tm * 0.60);
    const ws = w.pcts.map(p => r5(tm * p));
    const wu2 = w.deload ? null : r5((wu1 + ws[0]) / 2);
    out[lift] = { wu1, wu2, ws };
  });
  return out;
}

function liftRows(loads, key, name, w) {
  const { wu1, wu2, ws } = loads[key];
  const isTest = w.testing;
  const rLabel = isTest ? 'Attempt' : 'Working set';
  const bClass = isTest ? 'badge-attempt' : 'badge-work';
  const rStr = isTest ? '1 rep' : `${w.reps} reps`;
  const pLabels = isTest
    ? ['88% TM','93% TM','97% TM','100% TM']
    : w.pcts.map(p => `${Math.round(p*100)}% TM`);
  let h = `<div class="lift-row"><div class="lift-label">${name}<div class="lift-sub">Pattern activation ~60% TM</div></div><span class="badge badge-wu">${w.deload?'3':'5'} reps</span><div class="lift-target">${wu1} lbs</div></div>`;
  if (wu2) h += `<div class="lift-row"><div class="lift-label">Warm-up 2<div class="lift-sub">Bridge to working weight</div></div><span class="badge badge-wu">2 reps</span><div class="lift-target">${wu2} lbs</div></div>`;
  ws.forEach((wt, i) => {
    h += `<div class="lift-row"><div class="lift-label">${rLabel} ${i+1}<div class="lift-sub">${pLabels[i]}</div></div><span class="badge ${bClass}">${rStr}</span><div class="lift-target">${wt} lbs</div></div>`;
  });
  return h;
}

function accRow(ex, weekN, dayN, isWorking, locked) {
  const idBase = `w${weekN}d${dayN}${ex.name.replace(/\s/g,'').substring(0,8)}`;
  const inputs = ex.sets.map((v, si) => {
    const id = `${idBase}s${si}`;
    const disAttr = locked ? ' disabled' : '';
    const checkFn = isWorking ? `handleSetCheck(this,true)` : `handleSetCheck(this,false)`;
    return `<div class="set-wrap">
      <span class="set-lbl">S${si+1}</span>
      <div class="set-input-row">
        <input id="${id}" class="set-input" data-week="${weekN}" data-day="${dayN}" data-ex="${ex.name}" data-s="${si}" type="text" value="${v}" inputmode="text"${disAttr}>
        ${!locked ? `<div class="set-check" onclick="${checkFn}"></div>` : ''}
      </div>
    </div>`;
  }).join('');
  const autofillBtn = !locked && ex.sets.length > 1 ? `<button class="autofill-btn" onclick="autofill(this)">Copy to all</button>` : '';
  return `<div class="acc-row">
    <div class="acc-header" onclick="toggleCue(this)">
      <div class="acc-header-left">
        <div class="acc-top">
          <span class="acc-name">${ex.name}</span>
          <span class="acc-meta">${ex.meta||ex.vol}</span>
          <span class="acc-rec">rec: ${ex.rec}</span>
        </div>
      </div>
      <span class="acc-chevron">▾</span>
    </div>
    <div class="acc-cue">${ex.cue}</div>
    <div class="acc-body">
      <div class="set-inputs">${inputs}</div>
      ${autofillBtn}
    </div>
  </div>`;
}

function accRows(arr, weekN, dayN, isWorking, locked) {
  return arr.map(ex => accRow(ex, weekN, dayN, isWorking, locked)).join('');
}

function getPB(weekN, dayN) {
  if (dayN === 0) return weekN <= 2 ? PB.monEarly : PB.monLate;
  if (dayN === 1) return weekN <= 2 ? PB.tueEarly : PB.tueLate;
  return PB.fri;
}

function getPBTitle(dayN) {
  if (dayN === 0) return 'Power block · vertical jump (15 min)';
  if (dayN === 1) return 'Power block · hitting power (15 min)';
  return 'Power block · explosiveness (15 min)';
}

function getVBCallout(weekN, dayN) {
  if (dayN === 0) return weekN <= 2 ? 'Box jumps: step down, never drop. At 240 lbs, landing stress accumulates fast on sand + court.' : 'Depth drops are new from Week 3. Land soft, react fast — don\'t pause at the bottom.';
  if (dayN === 1) return 'Rotational throws are the most direct hitting power stimulus in the gym. Full trunk wind-up every rep.';
  return 'Track your approach jump height and compare to Week 1 baseline — this is your primary performance KPI.';
}

function buildLiftDay(weekN, liftDayN, w, loads) {
  const locked = w.done;

  let h = `<div style="padding:12px 16px 0"><span class="day-tag tag-lift">${tags[liftDayN]}</span></div>`;
  if (locked) h += `<div class="locked-banner"><span>✓ Week ${weekN} completed — view only</span></div>`;

  h += `<div class="section"><div class="section-header">Accessories · tap name for cues</div>${accRows(accData[liftDayN], weekN, liftDayN, false, locked)}</div>`;

  return h + `<div class="spacer"></div>`;
}

const LIFT_DAY_MAP = [0, 1, null, null, 2, null, null]; // Mon=0, Tue=1, Fri=2

function buildWeekContent(weekIdx) {
  const w = WEEKS[weekIdx];
  const loads = calcLoads(w.n);
  let html = '';
  for (let d = 0; d < 7; d++) {
    const liftIdx = LIFT_DAY_MAP[d];
    let content;
    if (d === 2) content = buildWed(w.n, w.done);
    else if (d === 3) content = buildThu(w.n, w.done);
    else if (d === 5) content = buildSat(w.n, w.done);
    else if (d === 6) content = buildSun();
    else content = buildLiftDay(w.n, liftIdx, w, loads);
    const isActive = d === currentDayIdx;
    html += `<div class="day-screen${isActive?' active':''}" id="day-${weekIdx}-${d}">${content}</div>`;
  }
  return html;
}

function renderWeekStrip() {

    return `<button class="week-pill ${cls}${i===currentWeekIdx?' active':''}" onclick="switchWeek(${i})">W${w.n}<div class="wdot"></div></button>`;
  }).join('');
}

function renderWeekInfo() {
  const w = WEEKS[currentWeekIdx];
  const badge = w.done ? '<span class="done-badge">Completed</span>' : '';
  document.getElementById('weekInfo').innerHTML = `<span class="week-title">${w.phase}</span><span class="week-meta">${w.dates} &middot; ${w.intensity} &middot; ${w.volume}</span>${badge}`;

function renderDayStrip() {
  const todayDayIdx = getTodayDayIdx();
  const todayWeekIdx = getTodayWeekIdx();
  const days = [
    {label:'Mon',cls:'lift-day'},{label:'Tue',cls:'lift-day'},{label:'Wed',cls:'vb-day'},
    {label:'Thu',cls:''},{label:'Fri',cls:'lift-day'},{label:'Sat',cls:'pump-day'},{label:'Sun',cls:''},
  ];
  document.getElementById('dayStrip').innerHTML = days.map((d, i) => {
    const isToday = i === todayDayIdx && currentWeekIdx === todayWeekIdx;
    const todayMarker = isToday ? '<div class="today-dot"></div>' : '';
    return `<button class="day-pill ${d.cls}${i===currentDayIdx?' active':''}${isToday?' today-pill':''}" onclick="switchDay(${i})">${d.label}<div class="ddot"></div>${todayMarker}</button>`;
  }).join('');
}

function renderContent() {
  document.getElementById('programContent').innerHTML = buildWeekContent(currentWeekIdx);
  setTimeout(updateProgress, 50);
}

function switchWeek(idx) {
  currentWeekIdx = idx;
  currentDayIdx = 0;
  stopTimer();
  renderWeekStrip();
  renderWeekInfo();
  renderDayStrip();
  renderContent();
}

function switchDay(idx) {
  currentDayIdx = idx;
  document.querySelectorAll('.day-pill').forEach((p,i) => p.classList.toggle('active', i===idx));
  document.querySelectorAll('.day-screen').forEach((s,i) => s.classList.toggle('active', i===idx));
  stopTimer();
  setTimeout(updateProgress, 50);
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('mainHeader').style.display = name==='program' ? 'block' : 'none';
  ['program','history','maxes'].forEach(n => {
    document.getElementById('ni-'+n).className = 'nav-icon'+(n===name?' on':'');
    document.getElementById('nl-'+n).className = 'nav-lbl'+(n===name?' on':'');
  });
  if (name==='history') loadHistory();
}

  const data = {};

    const ex = inp.getAttribute('data-ex');
    const s = parseInt(inp.getAttribute('data-s'));
    if (!data[ex]) data[ex] = [];
    data[ex][s] = inp.value || '-';
  });
  return data;
}

async function saveSession(weekN, dayN) {
  const statusEl = document.getElementById(`status-${weekN}-${dayN}`);
  const btn = document.querySelector(`button[onclick="saveSession(${weekN},${dayN})"]`);
  if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }
  const inputs = getInputsForDay(weekN, dayN);
  const date = new Date().toLocaleDateString('en-US');
  const dayLabel = DAY_NAMES[dayN];
  try {
    for (const [ex, sets] of Object.entries(inputs)) {
      await fetch(SHEET_URL, {
        method:'POST', mode:'no-cors',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({tab:'Log', row:[date,`Week ${weekN}`,dayLabel,ex,sets.length,'',...sets]})
      });
    }
    if (statusEl) statusEl.innerHTML = `<div class="callout c-success" style="margin-top:8px">Session saved to Google Sheets</div>`;
    if (btn) { btn.textContent = 'Saved ✓'; setTimeout(()=>{ btn.disabled=false; btn.textContent='Save session to Google Sheets'; }, 3000); }
  } catch(e) {
    if (statusEl) statusEl.innerHTML = `<div class="callout c-error" style="margin-top:8px">Save failed — check your connection</div>`;
    if (btn) { btn.disabled=false; btn.textContent='Save session to Google Sheets'; }
  }
}

async function saveMaxes() {
  const btn = event.target;
  const statusEl = document.getElementById('maxes-status');
  btn.disabled=true; btn.textContent='Saving...';
  const row = [new Date().toLocaleDateString('en-US'), document.getElementById('tm-squat').value, document.getElementById('tm-bench').value, document.getElementById('tm-dl').value, document.getElementById('tm-ohp').value];
  try {
    await fetch(SHEET_URL, {method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({tab:'Maxes',row})});
    statusEl.innerHTML='<div class="callout c-success" style="margin-top:8px">Maxes saved to Google Sheets</div>';
    btn.textContent='Saved ✓';
    setTimeout(()=>{btn.disabled=false;btn.textContent='Save maxes to sheet';},3000);
  } catch(e) {
    statusEl.innerHTML='<div class="callout c-error" style="margin-top:8px">Save failed — check your connection</div>';
    btn.disabled=false; btn.textContent='Save maxes to sheet';
  }
}

async function loadHistory() {
  const el = document.getElementById('history-content');
  el.innerHTML='<div class="empty-state">Loading...</div>';
  try {
    const res = await fetch(SHEET_URL+'?tab=Log');
    const data = await res.json();
    const rows = data.rows.slice(1);
    if (!rows.length) { el.innerHTML='<div class="empty-state">No sessions logged yet.<br>Complete your first session and save it.</div>'; return; }
    const byDate = {};
    rows.forEach(r => {
      const key=r[0]+'|'+r[2];
      if (!byDate[key]) byDate[key]={date:r[0],day:r[2],week:r[1],exercises:[]};
      byDate[key].exercises.push(r[3]);
    });
    el.innerHTML = Object.values(byDate).reverse().map(s =>
      `<div class="section" style="margin:12px 16px 0"><div class="hist-row"><div class="hist-date">${s.date} &middot; ${s.week}</div><div class="hist-title">${s.day}</div><div class="hist-detail">${s.exercises.slice(0,4).join(', ')}${s.exercises.length>4?' +'+(s.exercises.length-4)+' more':''}</div></div></div>`
    ).join('')+'<div class="spacer"></div>';
  } catch(e) {
    el.innerHTML='<div class="empty-state">Could not load history.<br>Check your internet connection.</div>';
  }
}
